name: Build Kernel Module

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    uses: sfera-labs/sl-kmod-commons/.github/workflows/kmod-build.yml@main
    with:
      archs: '["arm64", "armhf", "arm", "fake"]'
      kernel_count: 1
      kernel_version: '6.12.75+rpt-rpi-v8'
      module_path: '.'
